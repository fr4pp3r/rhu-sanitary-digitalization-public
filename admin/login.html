<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login – RHU Sanitary Permit System</title>
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body>

<div class="login-page">
  <div class="login-card">

    <div class="login-logo">
      <div class="logo-circle">🏥</div>
      <h1>RHU Admin Portal</h1>
      <p>Sanitary Permit Management System</p>
    </div>

    <div id="login-alert" class="hidden"></div>

    <form id="login-form" novalidate>
      <div class="form-group">
        <label for="email">Email Address <span class="required">*</span></label>
        <input type="email" id="email" class="form-control" placeholder="admin@rhu.gov.ph"
               required autocomplete="email" />
        <div class="form-error" id="err-email">Please enter your email.</div>
      </div>

      <div class="form-group">
        <label for="password">Password <span class="required">*</span></label>
        <div style="position:relative;">
          <input type="password" id="password" class="form-control" placeholder="••••••••"
                 required autocomplete="current-password" style="padding-right:2.5rem;" />
          <button type="button" id="toggle-pw"
                  style="position:absolute;right:.7rem;top:50%;transform:translateY(-50%);
                         background:none;border:none;cursor:pointer;font-size:1rem;color:var(--gray-500);">
            👁️
          </button>
        </div>
        <div class="form-error" id="err-password">Please enter your password.</div>
      </div>

      <button type="submit" class="btn btn-primary btn-block mt-3" id="btn-login">
        <span id="login-label">Sign In</span>
      </button>
    </form>

    <!-- Demo hint (remove in production) -->
    <div class="alert alert-info mt-4" style="font-size:.83rem;">
      <span class="alert-icon">ℹ️</span>
      <div>
        <strong>Demo mode:</strong> Enter any email and password to log in.
        Supabase Auth is used in production.
      </div>
    </div>

    <div style="text-align:center;margin-top:1rem;">
      <a href="../index.html" style="font-size:.88rem;color:var(--gray-600);">← Back to Client Portal</a>
    </div>

  </div>
</div>

<div id="toast-container" class="toast-container"></div>

<script type="module">
import { getSupabaseClient } from '../js/supabase.js';
import { showToast } from '../js/utils.js';

const form    = document.getElementById('login-form');
const btnLogin = document.getElementById('btn-login');
const label   = document.getElementById('login-label');
const alertEl = document.getElementById('login-alert');

// Toggle password visibility
document.getElementById('toggle-pw').addEventListener('click', () => {
  const pw = document.getElementById('password');
  pw.type = pw.type === 'password' ? 'text' : 'password';
});

form.addEventListener('submit', async e => {
  e.preventDefault();

  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;

  // Simple presence validation
  let ok = true;
  if (!email)    { document.getElementById('err-email').classList.add('visible');    ok = false; }
  else             document.getElementById('err-email').classList.remove('visible');
  if (!password) { document.getElementById('err-password').classList.add('visible'); ok = false; }
  else             document.getElementById('err-password').classList.remove('visible');
  if (!ok) return;

  btnLogin.disabled = true;
  label.textContent = '⏳ Signing in…';
  alertEl.classList.add('hidden');

  const sb = getSupabaseClient();

  if (sb) {
    const { error } = await sb.auth.signInWithPassword({ email, password });
    if (error) {
      showLoginError(error.message || 'Invalid credentials.');
      return;
    }
    window.location.href = 'dashboard.html';
  } else {
    // Demo / offline mode: accept any credentials
    sessionStorage.setItem('rhu_admin_demo', JSON.stringify({ email, loginAt: Date.now() }));
    window.location.href = 'dashboard.html';
  }
});

function showLoginError(msg) {
  btnLogin.disabled = false;
  label.textContent = 'Sign In';
  alertEl.className = 'alert alert-danger';
  alertEl.innerHTML = `<span class="alert-icon">❌</span><div>${msg}</div>`;
  alertEl.classList.remove('hidden');
}
</script>
</body>
</html>

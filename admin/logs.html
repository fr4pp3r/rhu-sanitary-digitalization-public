<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Logs – NARRA MUNICIPAL HEALTH OFFICE Admin</title>
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<div class="admin-layout">

  <!-- ── Sidebar ── -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <img src="../assets/logo/Narra-MHO.png" alt="NARRA MHO" class="sidebar-logo" />
      <div>
        <div style="font-size:.9rem;">NARRA MHO Admin</div>
        <div style="font-size:.72rem;opacity:.7;">Services Portal</div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <a href="dashboard.html">
        <span class="nav-icon">📊</span>
        <span class="nav-label">Dashboard</span>
      </a>
      <a href="applications.html">
        <span class="nav-icon">📋</span>
        <span class="nav-label">Applications</span>
      </a>
      <a href="services.html">
        <span class="nav-icon">🛠️</span>
        <span class="nav-label">Services</span>
      </a>
      <a href="logs.html" class="active">
        <span class="nav-icon">📜</span>
        <span class="nav-label">Logs</span>
      </a>
    </nav>
    <div class="sidebar-footer">
      <button class="btn btn-outline btn-sm btn-block" id="btn-logout"
              style="color:#fff;border-color:rgba(255,255,255,.5);">
        Sign Out
      </button>
    </div>
  </aside>

  <!-- ── Main ── -->
  <div class="admin-main">
    <div class="admin-topbar">
      <button id="sidebar-toggle" class="btn btn-outline btn-sm">☰</button>
      <h1>Activity Logs</h1>
      <div class="log-filters" style="margin-bottom:1rem;display:flex;align-items:center;gap:0.5rem;">
        <input type="text" id="searchInput" placeholder="Search logs..." style="padding:0.3rem;flex:1;"/>
        <select id="actionFilter" style="padding:0.3rem;">
          <option value="">All Actions</option>
          <option value="Submitted application">Submitted application</option>
        </select>
      </div>
      <span id="admin-email" style="font-size:.88rem; color:var(--gray-600);"></span>
    </div>

    <div class="admin-content">
      <style>
        .log-entry-summary { cursor: pointer; }
        .log-entry-summary:hover { background: rgba(0,0,0,0.03); }
        .log-toggle-icon {
          display: inline-block;
          width: 1.2em;
          text-align: center;
          transition: transform 0.2s ease;
          font-size: 0.8rem;
          color: var(--gray-500);
        }
        .log-entry-expanded .log-toggle-icon {
          transform: rotate(90deg);
        }
        .log-detail-row {
          display: none;
        }
        .log-entry-expanded + .log-detail-row {
          display: table-row;
        }
        .log-detail-cell {
          padding: 0.75rem 1rem !important;
          background: var(--gray-50);
          border-top: 1px solid var(--gray-200);
        }
        .log-detail-cell pre {
          margin: 0;
          white-space: pre-wrap;
          word-break: break-word;
          font-size: 0.85rem;
          max-height: 300px;
          overflow-y: auto;
        }
      </style>
      <div class="card">
        <div class="card-body" style="padding:0;">
          <div class="table-wrap">
            <table id="logs-table">
              <thead>
                <tr>
                  <th>Timestamp</th>
                  <th>Actor</th>
                  <th>Reference #</th>
                  <th>Action</th>
                </tr>
              </thead>
              <tbody id="logs-body">
                <tr><td colspan="4" style="text-align:center;color:var(--gray-500);padding:2rem;">Loading…</td></tr>
              </tbody>
            </table>
          <!-- pagination controls -->
          <div class="log-pagination" style="margin-top:1rem;padding-bottom:1.0rem;display:flex;align-items:center;justify-content:center;gap:0.5rem;width:100%;">
            <button id="prevPage" class="btn btn-outline btn-sm" disabled>Prev</button>
            <span id="pageInfo">Page 1</span>
            <button id="nextPage" class="btn btn-outline btn-sm">Next</button>
          </div>
          </div>
        </div>
      </div>
    </div>

  </div><!-- /.admin-main -->

</div><!-- /.admin-layout -->

<div id="toast-container" class="toast-container"></div>

<script type="module">
import { getSupabaseClient } from '../js/supabase.js';
import { fetchLogs } from '../js/db.js';
import { escapeHtml, formatDateTime, showToast } from '../js/utils.js';

// Auth guard
(async () => {
  const sb = getSupabaseClient();
  const { data: { session } } = await sb?.auth?.getSession() ?? {};
  if (!session) { window.location.href = 'login.html'; return; }
  document.getElementById('admin-email').textContent = session.user.email;
  loadLogs();
})();

let allLogs = [];
async function loadLogs() {
  const { data: logs, error } = await fetchLogs({ perPage: 100 }); // show recent 100
  if (error) {
    showToast('Failed to load logs.', 'danger');
    return;
  }
  if (!logs || logs.length === 0) {
    renderLogs([]);
    return;
  }
  // store for filtering
  allLogs = logs;
  applyFilters();
}

let currentPage = 1;
const PAGE_SIZE = 20;
function applyFilters() {
  const searchTerm = document.getElementById('searchInput')?.value?.toLowerCase() || '';
  const actionVal = document.getElementById('actionFilter')?.value || '';
  const filtered = allLogs.filter(l => {
    const matchesAction = actionVal === '' || l.action === actionVal;
    const searchable = `${l.created_at} ${l.actor_type} ${l.actor_identifier} ${l.reference_number || ''} ${l.action} ${JSON.stringify(l.details)}`.toLowerCase();
    const matchesSearch = searchable.includes(searchTerm);
    return matchesAction && matchesSearch;
  });
  // pagination slice
  const start = (currentPage - 1) * PAGE_SIZE;
  const pageSlice = filtered.slice(start, start + PAGE_SIZE);
  renderLogs(pageSlice);
  // update pagination UI
  document.getElementById('pageInfo').textContent = `Page ${currentPage}`;
  document.getElementById('prevPage').disabled = currentPage === 1;
  document.getElementById('nextPage').disabled = start + PAGE_SIZE >= filtered.length;
}

function setupLogFilters() {
  const searchInput = document.getElementById('searchInput');
  const actionFilter = document.getElementById('actionFilter');
  const prevBtn = document.getElementById('prevPage');
  const nextBtn = document.getElementById('nextPage');

  if (searchInput && !searchInput.dataset.bound) {
    searchInput.dataset.bound = 'true';
    searchInput.addEventListener('input', () => {
      currentPage = 1;
      applyFilters();
    });
  }

  if (actionFilter && !actionFilter.dataset.bound) {
    actionFilter.dataset.bound = 'true';
    actionFilter.addEventListener('change', () => {
      currentPage = 1;
      applyFilters();
    });
  }

  if (prevBtn && !prevBtn.dataset.bound) {
    prevBtn.dataset.bound = 'true';
    prevBtn.addEventListener('click', () => {
      if (currentPage > 1) {
        currentPage--;
        applyFilters();
      }
    });
  }

  if (nextBtn && !nextBtn.dataset.bound) {
    nextBtn.dataset.bound = 'true';
    nextBtn.addEventListener('click', () => {
      currentPage++;
      applyFilters();
    });
  }
}

setupLogFilters();

// Render logs with optional filters
 function renderLogs(logs) {
    const tbody = document.getElementById('logs-body');
    if (!logs || logs.length === 0) {
      tbody.innerHTML = `<tr><td colspan="4" style="text-align:center;color:var(--gray-500);">No logs
  recorded.</td></tr>`;
      return;
    }

    tbody.innerHTML = logs.map(l => `
      <!-- Summary row – clickable -->
      <tr class="log-entry-summary">
        <td><span class="log-toggle-icon">&#9654;</span> ${formatDateTime(l.created_at)}</td>
        <td>${escapeHtml(l.actor_type)}: ${escapeHtml(l.actor_identifier)}</td>
        <td>${l.reference_number ? `<code>${escapeHtml(l.reference_number)}</code>` : ''}</td>
        <td>${escapeHtml(l.action)}</td>
      </tr>
      <!-- Detail row – hidden by default -->
      <tr class="log-detail-row">
        <td colspan="4" class="log-detail-cell"><pre>${escapeHtml(JSON.stringify(l.details, null, 2))}</pre></td>
      </tr>`).join('');

    // Attach toggle handler to each summary row
    tbody.querySelectorAll('tr.log-entry-summary').forEach(row => {
      row.addEventListener('click', () => row.classList.toggle('log-entry-expanded'));
    });
  }

document.getElementById('btn-logout').addEventListener('click', async () => {
  const sb = getSupabaseClient();
  if (sb) await sb.auth.signOut();
  window.location.href = 'login.html';
});
</script>
<script type="module" src="../js/site.js"></script>
</body>
</html>
